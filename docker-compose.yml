services:
  postgis:
    image: postgis/postgis:17-3.4
    container_name: postgis_annuaire
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-annuaire_ctm_1}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-madinina972}
    volumes:
      - pgdata_annuaire:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-annuaire_ctm_1}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: .
    image: docker-test-backend:latest
    container_name: node_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: ${DB_HOST:-postgis}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-annuaire_ctm_1}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-madinina972}
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  pgdata_annuaire:
    external: true
